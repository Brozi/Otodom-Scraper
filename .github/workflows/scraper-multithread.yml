name: Multithread Otodom Scraper

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch:

env:
    ACTIVE_SETTINGS_JSON: ${{ secrets.SETTINGS_JSON }}

jobs:
  # ==========================================
  # JOB 1: Discover the price ranges
  # ==========================================
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create base settings.json securely
        working-directory: ./real-estate-project
        run: |
          cat << 'EOF' > settings.json
          ${{ env.ACTIVE_SETTINGS_JSON }}
          EOF

      - name: Run Discovery Script
        id: set-matrix
        working-directory: ./real-estate-project
        run: python -u jobs/run_discovery.py


  # ==========================================
  # JOB 2: Run the scraper N times in parallel
  # ==========================================
  scrape_chunk:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one chunk fails, let the others finish
      matrix:
        range: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create base settings.json securely
        working-directory: ./real-estate-project
        run: |
          cat << 'EOF' > settings.json
          ${{ env.ACTIVE_SETTINGS_JSON }}
          EOF

      - name: Inject Matrix Prices into settings.json
        working-directory: ./real-estate-project
        # This reads the settings.json we just created, updates the min/max prices for this specific chunk, and saves it.
        run: |
          python -c "
          import json
          with open('settings.json', 'r') as f: data = json.load(f)
          # Split the 'min-max' string back into variables
          min_val, max_val = '${{ matrix.range }}'.split('-')
          data['crawler']['price']['min'] = int(min_val)
          data['crawler']['price']['max'] = int(max_val)
          with open('settings.json', 'w') as f: json.dump(data, f, indent=4)
          "

      - name: Run the Scraper
        working-directory: ./real-estate-project
        timeout-minutes: 355
        run: python main.py

      - name: Upload Chunk Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results-${{ matrix.range }}
          path: |
            real-estate-project/*.csv
            real-estate-project/*.xlsx
            real-estate-project/log/scraper_log_*.txt
            real-estate-project/debug_page.html
            real-estate-project/found_investments.txt
          retention-days: 2 # Keep individual chunks for a short time to save space
  # ==========================================
  # JOB A: Discover primary investments upfront
  # ==========================================
  discover_investments:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-inv-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - name: Create settings.json
        working-directory: ./real-estate-project
        run: |
          cat << 'EOF' > settings.json
          ${{ env.ACTIVE_SETTINGS_JSON }}
          EOF
      - name: Discover Investments
        id: set-inv-matrix
        working-directory: ./real-estate-project
        # Add PYTHONPATH=. right before python
        run: PYTHONPATH=. python -u jobs/run_inv_discovery.py

  # ==========================================
  # JOB B: Scrape primary investments (Runs in parallel with scrape_chunk)
  # ==========================================
  scrape_primary_investments:
    name: scrape_primary_investment (${{ strategy.job-index }})  # <--- ADD THIS LINE
    needs: discover_investments
    if: ${{ needs.discover_investments.outputs.matrix != '[[]]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        urls: ${{ fromJson(needs.discover_investments.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - name: Create settings.json
        working-directory: ./real-estate-project
        run: |
          cat << 'EOF' > settings.json
          ${{ env.ACTIVE_SETTINGS_JSON }}
          EOF
      - name: Run Investment Scraper
        working-directory: ./real-estate-project
        run: PYTHONPATH=. python -u jobs/run_investments.py '${{ toJSON(matrix.urls) }}'
      - name: Upload Chunk Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
            # Prefix with scraper-results- so the merger's wildcard pattern catches it!
            name: scraper-results-inv-${{ strategy.job-index }}
            path: |
              real-estate-project/*.csv
              real-estate-project/*.xlsx
              real-estate-project/scraped_investments.txt
            retention-days: 2

  # ==========================================
  # JOB C: Compare found vs already scraped
  # ==========================================
  compare_investments:
    needs: [ scrape_chunk, scrape_primary_investments ]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compare.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all_data
      - name: Compare and Generate Leftovers
        id: compare
        run: |
          python -c "
          import glob, json, os

          found_urls = set()
          for f in glob.glob('all_data/**/found_investments.txt', recursive=True):
              with open(f, 'r') as file: found_urls.update(line.strip() for line in file if line.strip())

          scraped_urls = set()
          for f in glob.glob('all_data/**/scraped_investments.txt', recursive=True):
              with open(f, 'r') as file: scraped_urls.update(line.strip() for line in file if line.strip())

          leftovers = list(found_urls - scraped_urls)
          print(f'Found: {len(found_urls)}, Scraped: {len(scraped_urls)}, Leftovers: {len(leftovers)}')

          chunk_size = 5
          chunks = [leftovers[i:i + chunk_size] for i in range(0, len(leftovers), chunk_size)]
          if not chunks: chunks = [[]]

          with open(os.environ['GITHUB_OUTPUT'], 'a') as env:
              env.write(f'matrix={json.dumps(chunks)}\n')
          "

  # ==========================================
  # JOB D: Scrape Leftover hidden investments
  # ==========================================
  scrape_leftover_investments:
    needs: compare_investments
    if: ${{ needs.compare_investments.outputs.matrix != '[[]]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        urls: ${{ fromJson(needs.compare_investments.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - name: Create settings.json
        working-directory: ./real-estate-project
        run: echo "${{ env.ACTIVE_SETTINGS_JSON }}" > settings.json
      - name: Run Leftover Scraper
        working-directory: ./real-estate-project
        run: python jobs/run_investments.py '${{ toJSON(matrix.urls) }}'
      - name: Upload Leftover Chunk Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results-leftover-${{ strategy.job-index }}
          path: |
            real-estate-project/*.csv
            real-estate-project/*.xlsx
            real-estate-project/scraped_investments.txt
          retention-days: 2


  # ==========================================
  # JOB 3: Merge all chunks into one final file
  # ==========================================
  merge:
    needs: [ scrape_chunk, scrape_leftover_investments ]
    if: always() # Run merge even if one chunk failed, so you don't lose data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all Chunk Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scraper-results-*
          path: all_data

      - name: Run Merge Script
        working-directory: ./real-estate-project
        # Assuming your merge runner is here
        run: python jobs/run_merge.py

      - name: Upload Final Master Files
        uses: actions/upload-artifact@v4
        with:
          name: final-scraper-results
          path: |
            real-estate-project/master_listings.csv
            real-estate-project/master_listings.xlsx
          retention-days: 7