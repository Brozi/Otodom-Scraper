name: Monthly Otodom Scraper

# This tells GitHub WHEN to run the script
on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch: # Adds a "Run Now" button to GitHub so you can test it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./otodomscraper

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Change if you use a different version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create settings.json securely
        # This takes your GitHub Secret and creates the file on the server
        run: |
          cat << 'EOF' > settings.json
          ${{ secrets.SETTINGS_JSON }}
          EOF

      - name: Run the Scraper
        # If your main.py is inside the otodomscraper folder, adjust the path below
        run: python main.py

      - name: Upload Logs and CSV
        # always() ensures it uploads the logs even if the script crashes halfway!
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results
          path: |
            *.csv
            scraper_log_*.txt
            debug_page.html
          retention-days: 7